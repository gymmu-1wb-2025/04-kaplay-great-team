<script type="module">

import kaplay from "https://unpkg.com/kaplay@4000.0.0-alpha.20/dist/kaplay.mjs";

const k = kaplay();
const { add, pos, rect, circle, area, color, move, rand, width, height,
onKeyDown, loop, onCollide, destroy, onUpdate, text, anchor, outline } = k;


// ================== SPIEL VARIABLEN ==================

let score = 0;
let gameOver = false;
let currentLevel = 1;
let levelTransition = false;

let appleSpeed = { min: 170, max: 240 };


// ================== SPIELER ==================

const player = add([
    pos(width()/2, height()-90),
    area({ shape: new k.Rect(k.vec2(-40,-40),80,80) }),
    anchor("center"),
    "player",
    { speed:300 }
]);

// Kopf
player.add([ circle(12), pos(0,-34), color(255,220,180), outline(2) ]);

// Körper
player.add([ rect(28,38), pos(0,-10), anchor("center"), color(30,80,220), outline(2) ]);

// Korb
player.add([ rect(70,18,{radius:6}), pos(0,16), anchor("center"),
color(139,69,19), outline(2), "basket" ]);


// ================== HUD ==================

const scoreText = add([
    text("Score: 0",{size:24}),
    pos(12,12),
    color(0,0,0)
]);

const levelText = add([
    text("Level: 1",{size:24}),
    pos(12,42),
    color(0,0,0)
]);


// ================== STEUERUNG ==================

onKeyDown("left", () => {
    if(!gameOver && !levelTransition) player.move(-player.speed,0);
});

onKeyDown("right", () => {
    if(!gameOver && !levelTransition) player.move(player.speed,0);
});

player.onUpdate(()=>{
    const half = 40;
    if(player.pos.x < half) player.pos.x = half;
    if(player.pos.x > width()-half) player.pos.x = width()-half;
});


// ================== APFEL ERSTELLEN ==================

function spawnApple(type,colorValue){
    add([
        circle(15),
        pos(rand(0,width()),0),
        area(),
        move(k.DOWN, rand(appleSpeed.min,appleSpeed.max)),
        color(...colorValue),
        type
    ]);
}


// normale / giftige Äpfel
loop(1,()=>{
    if(gameOver || levelTransition) return;

    const poison = Math.random() < 0.25;

    if(poison) spawnApple("poisonApple",[30,120,30]);
    else spawnApple("apple",[255,0,0]);
});


// goldener Apfel
loop(6,()=>{
    if(gameOver || levelTransition || currentLevel < 2) return;

    add([
        circle(15),
        pos(rand(0,width()),0),
        area(),
        move(k.DOWN, rand(appleSpeed.min,appleSpeed.max)),
        color(255,215,0),
        outline(2,k.rgb(218,165,32)),
        "goldenApple"
    ]);
});


// violetter Apfel
loop(4,()=>{
    if(gameOver || levelTransition || currentLevel < 2) return;

    spawnApple("purpleApple",[138,43,226]);
});


// ================== KOLLISIONEN ==================

onCollide("player","apple",(p,a)=>{
    if(gameOver || levelTransition) return;

    destroy(a);
    score++;
    scoreText.text = "Score: "+score;
});

onCollide("player","poisonApple",(p,a)=>{
    if(gameOver || levelTransition) return;

    destroy(a);
    endGame();
});

onCollide("player","goldenApple",(p,a)=>{
    if(gameOver || levelTransition) return;

    destroy(a);
    score += 2;
    scoreText.text = "Score: "+score;
});

onCollide("player","purpleApple",(p,a)=>{
    if(gameOver || levelTransition) return;

    destroy(a);
    score -= 2;
    if(score < 0) score = 0;
    scoreText.text = "Score: "+score;
});


// ================== ÄPFEL ENTFERNEN ==================

function removeIfOut(obj){
    if(obj.pos.y > height()+30) destroy(obj);
}

onUpdate("apple", removeIfOut);
onUpdate("poisonApple", removeIfOut);
onUpdate("goldenApple", removeIfOut);
onUpdate("purpleApple", removeIfOut);


// ================== LEVEL SYSTEM ==================

let overlay = null;
let levelMessage = null;

function showLevelTransition(){

    levelTransition = true;

    overlay = add([
        rect(width(),height()),
        pos(0,0),
        color(0,0,0),
        k.opacity(0.5),
        k.fixed(),
        k.z(100)
    ]);

    levelMessage = add([
        text("NÄCHSTES LEVEL\n\n(Leertaste drücken)",{size:48,align:"center"}),
        pos(width()/2,height()/2),
        anchor("center"),
        color(255,215,0),
        k.fixed(),
        k.z(101)
    ]);
}

onKeyDown("space",()=>{

    if(!levelTransition) return;

    destroy(overlay);
    destroy(levelMessage);

    levelTransition = false;
    currentLevel++;

    levelText.text = "Level: "+currentLevel;

    appleSpeed.min += 30;
    appleSpeed.max += 30;
});

onUpdate(()=>{

    if(score >= 20 && currentLevel === 1 && !levelTransition) showLevelTransition();

    if(score >= 35 && currentLevel === 2 && !levelTransition) showLevelTransition();
});


// ================== GAME OVER ==================

function endGame(){

    gameOver = true;

    add([
        rect(width(),height()),
        pos(0,0),
        color(0,0,0),
        k.opacity(0.35),
        k.fixed()
    ]);

    add([
        text("GAME OVER\nScore: "+score+"\n(Seite neu laden zum Neustart)",
        {size:40,align:"center"}),
        pos(width()/2,height()/2),
        anchor("center"),
        color(255,255,255),
        k.fixed()
    ]);
}


// ================== HINTERGRUND ==================

// Himmel
add([
rect(width(),height()),
pos(0,0),
color(135,206,235),
k.z(-100),
]);

// Gras
add([
rect(width(),100),
pos(0,height()-100),
color(34,139,34),
k.z(-50),
]);

</script>
